worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 🔧 Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 🔒 Sécurité globale
    server_tokens off;

    # 📦 Logs (optionnel)
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # 🗜️ Compression
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # (optionnel mais mieux) Brotli si dispo
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/plain text/css application/json application/javascript image/svg+xml;

    server {
        listen 80;
        server_name _;
        absolute_redirect off;

        root /usr/share/nginx/html;
        index index.html;

        # 🔒 Headers de sécurité
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # CSP (à adapter si besoin externe)
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self';
            style-src 'self';
            img-src 'self' data:;
            font-src 'self' data:;
            connect-src 'self';
            frame-ancestors 'self';
        " always;

        # 🚫 Méthodes inutiles
        if ($request_method !~ ^(GET|HEAD)$) {
            return 405;
        }

        # 🚀 Cache assets (Astro génère hash → immutable)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # 🚀 Cache autres fichiers statiques
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # 📄 HTML (pas de cache pour éviter stale)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # 🔁 Fallback SPA (Astro avec routing client)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 🚫 Fichiers sensibles
        location ~ /\.(?!well-known) {
            deny all;
        }

        # 🧱 Limite taille requête (anti abus)
        client_max_body_size 1M;
    }
}
