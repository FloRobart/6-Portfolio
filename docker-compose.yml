services:
  portfolio-iscod:
    image: portfolio-iscod:latest
    build: .
    restart: always
    env_file: .env
    networks:
      - iscod-network
    ports:
      - ${APP_PORT:-}:80
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    user: "1800:1800"
    tmpfs:
      - /tmp:exec,nosuid,nodev,uid=1800,gid=1800
      - /run:rw,mode=0755,uid=1800,gid=1800
      - /run/nginx:rw,mode=0755,uid=1800,gid=1800
      - /var/cache/nginx:rw,uid=1800,gid=1800
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://portfolio-iscod:80/"]
      interval: 10m
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=iscod-network"
      - "traefik.http.routers.portfolio-iscod.rule=Host(`portfolio-iscod.florobart.fr`)"
      - "traefik.http.routers.portfolio-iscod.entrypoints=websecure"
      - "traefik.http.routers.portfolio-iscod.tls.certresolver=le"
      - "traefik.http.services.portfolio-iscod.loadbalancer.server.port=80"


networks:
  iscod-network:
    name: iscod-network
    driver: bridge
